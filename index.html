<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}
body{background:#060d1a;font-family:'Nunito','Noto Sans','Segoe UI','Helvetica Neue',Arial,'Noto Sans CJK SC','Noto Sans CJK JP','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;height:100dvh;overflow:hidden;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none;overscroll-behavior-y:none;margin:0;padding:0}
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh}
.card{background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #00f5ff44;border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;width:320px;box-shadow:0 0 40px #00f5ff22}
.logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:1px;text-shadow:0 0 20px #00f5ff,0 0 40px #ff6bb5}
.logo2{font-size:26px;font-weight:800;color:#ffd700;text-shadow:0 0 15px #ffd700}
.sub{color:#7ad4f0;font-size:13px}
input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #00f5ff55;background:#0a1a30;color:#fff;font-size:16px;outline:none;font-family:inherit}
.btn{width:100%;padding:13px;border-radius:12px;border:none;touch-action:manipulation;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px #00b4d844}
.btn-purple{background:linear-gradient(135deg,#7b2d8b,#4a0d6e);box-shadow:0 4px 20px #7b2d8b44}
.btn-orange{background:linear-gradient(135deg,#ff6b35,#b44fff);box-shadow:0 4px 20px #ff6b3544}
.btn-ghost{background:transparent;border:1.5px solid #ffffff33;box-shadow:none;color:#aaa}
.btn-red{background:linear-gradient(135deg,#c0392b,#96281b);box-shadow:0 4px 20px #c0392b44}
.panel{width:340px;max-height:90vh;background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #ffd70033;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px #ffd70022}
.panel-header{padding:20px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:1px solid #ffffff11}
.plist{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.pcard{display:flex;align-items:center;gap:10px;background:#ffffff08;border:1px solid #ffffff12;border-radius:14px;padding:13px}
.picon{font-size:30px;flex-shrink:0;width:38px;text-align:center}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pname{font-size:15px;font-weight:800;color:#fff;line-height:1;margin-bottom:3px}
.pdesc{font-size:12px;color:#9bbdd4;line-height:1.4}
.pdur{font-size:11px;color:#556;margin-top:3px}
.blist{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.brow{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;margin-bottom:4px;color:#cde;font-size:14px}
.brow-me{background:#00f5ff18;border:1.5px solid #00f5ff44}
.brow-top{background:#ffd70011}
.rnum{width:36px;font-weight:800;font-size:16px;flex-shrink:0}
.rnick{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rscore{font-weight:800;color:#ffd700;font-size:16px;flex-shrink:0}
.rdate{color:#556;font-size:11px;flex-shrink:0;width:50px;text-align:right}
.rflag{font-size:14px;flex-shrink:0}
.game-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 60px #00f5ff44}
canvas{display:block;-webkit-touch-callout:none;-webkit-user-select:none;touch-action:none}
#game-wrap{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.blist,.plist{touch-action:pan-y;pointer-events:auto}
.hud{position:absolute;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.score-hud{font-size:42px;font-weight:800;color:#fff;text-shadow:0 0 15px #00f5ff,2px 2px 0 #0003;line-height:1}
.combo-hud{font-size:16px;font-weight:700;color:#ffd700;text-shadow:0 0 10px #ffd700;margin-top:2px}
.pu-flash{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800;color:#ffd700;text-shadow:0 0 20px #ffd700;pointer-events:none;white-space:nowrap}
.overlay{position:absolute;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center}
.overlay-card{background:#0d2040ee;border:1.5px solid #00f5ff44;border-radius:16px;padding:24px 32px;text-align:center;display:flex;flex-direction:column;gap:6px}
.pause-overlay{position:absolute;inset:0;background:rgba(4,12,30,0.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200}
.pause-card{background:linear-gradient(145deg,#0d2448,#091830);border:2px solid #00f5ff55;border-radius:24px;padding:36px 44px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 0 60px #00f5ff22}
.pause-title{font-size:36px;font-weight:800;color:#fff;letter-spacing:2px;text-shadow:0 0 20px #00f5ff}
.pause-score{font-size:18px;color:#aef0ff}
.countdown-circle{position:relative;width:100px;height:100px}
.countdown-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;text-shadow:0 0 20px #00f5ff}

/* Settings */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #ffffff0a}
.settings-label{color:#cde;font-size:15px;font-weight:700}
.settings-sub{color:#556;font-size:11px;margin-top:2px}
.toggle{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:linear-gradient(135deg,#00b4d8,#0077b6)}
.toggle.off{background:#334}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px #0006}
.toggle.on::after{transform:translateX(22px)}

/* Language picker overlay */
.lang-overlay{position:fixed;inset:0;background:rgba(4,12,30,0.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999}
.lang-card{background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #00f5ff44;border-radius:20px;padding:24px;width:320px;max-height:85vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 0 60px #00f5ff22}
.lang-title{font-size:22px;font-weight:800;color:#fff;text-align:center;text-shadow:0 0 15px #00f5ff}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow-y:auto;flex:1}
.lang-btn{background:#ffffff08;border:1.5px solid #ffffff15;border-radius:12px;padding:10px 8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.lang-btn:active,.lang-btn.selected{background:#00f5ff22;border-color:#00f5ff66}
.lang-btn .flag{font-size:20px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes countPop{0%{transform:scale(1.5);opacity:0}30%{transform:scale(1);opacity:1}90%{opacity:1}100%{opacity:0;transform:scale(0.8)}}
@keyframes langIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

#game-hud {
  position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100;
}
.hud-btn {
  background: rgba(6, 13, 26, 0.6); border: 2px solid; border-radius: 12px; color: white;

.btn-pause { border-color: #ff9900; box-shadow: 0 0 10px #ff9900aa; }
.btn-rank { border-color: #ffd700; box-shadow: 0 0 10px #ffd700aa; }

#player-name-hud {
  position: absolute; top: 35px; left: 20px; color: rgba(255, 255, 255, 0.6);
  font-size: 16px; font-weight: bold; z-index: 100; pointer-events: none;
}

#canvas {
  width: 100vw; height: 100vh; display: block; z-index: 10;
  position: absolute; top: 0; left: 0;
}
</style>

function lerpCol(a,b,t){
  const ah=a.slice(1),bh=b.slice(1);
  const ar=[parseInt(ah.slice(0,2),16),parseInt(ah.slice(2,4),16),parseInt(ah.slice(4,6),16)];
  const br=[parseInt(bh.slice(0,2),16),parseInt(bh.slice(2,4),16),parseInt(bh.slice(4,6),16)];
  return"#"+ar.map((v,i)=>Math.round(lerp(v,br[i],t)).toString(16).padStart(2,"0")).join("");
}

function drawBgFish(ctx, f, t) {
  const bob = Math.sin(t * 0.04 + f.bobPhase) * 3.5;
  ctx.save();
  ctx.translate(f.x, f.y + bob);
  ctx.globalAlpha = f.alpha;
  ctx.imageSmoothingEnabled = false; 
  
  const img = BG_FISH_IMAGES[f.imgIdx];
  if (img && img.complete && img.naturalWidth !== 0) {
    const ratio = img.naturalWidth / img.naturalHeight;
    const targetH = 40 * f.scale; 
    const targetW = targetH * ratio;
    ctx.drawImage(img, -targetW/2, -targetH/2, targetW, targetH);
  }
  // Gdy obrazek jeszcze się nie wczytał — nie rysuj nic (zamiast szarej plamy).
  ctx.restore();
}

function drawFish(ctx, x, y, angle, shield, star, tiny) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  if (tiny) ctx.scale(0.5, 0.5);

  // Wymuszenie złotej rybki przy aktywnym Star Rush
  const currentSkinKey = star ? "gold" : (fishColor || "pink");
  const img = PLAYER_IMAGES[currentSkinKey];
  const glowCol = star ? "#ffd700" : (shield ? "#00f5ff" : "#ff6bb5");

  if (star || shield) {
    ctx.shadowColor = glowCol;
    ctx.shadowBlur = star ? 25 : 20;
    if (shield) {
      ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2);
      ctx.strokeStyle = "#00f5ff"; ctx.lineWidth = 3; ctx.globalAlpha = 0.6; ctx.stroke();
      ctx.globalAlpha = 0.1; ctx.fillStyle = "#00f5ff"; ctx.fill(); ctx.globalAlpha = 1;
    }
  }

  ctx.imageSmoothingEnabled = false; // Pixel art!
  
  if (img && img.complete && img.naturalWidth !== 0) {
    // Usunięto obracanie (scale(-1, 1)), ponieważ grafiki natywnie patrzą w prawo
    ctx.drawImage(img, -24, -16, 48, 32); 
  }
  // Gdy grafika gracza jeszcze niegotowa — nie rysuj nic (zamiast kolorowej plamy).

  ctx.restore();
}

function drawWorm(ctx,x,y,flipped){

  ctx.lineWidth=4;ctx.lineCap="round";ctx.strokeStyle="#cc4400";ctx.shadowColor="#ff6600";ctx.shadowBlur=3;
  segs.forEach(([[x1,y1],[cx1,cy1],[x2,y2]])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);ctx.stroke();});
  ctx.beginPath();ctx.arc(-22,1,3.5,0,Math.PI*2);ctx.fillStyle="#dd3300";ctx.fill();
  ctx.restore();
}
function drawFreeWorm(ctx,w,t2){

  ctx.save();ctx.translate(w.x,w.y+bob);

  ctx.globalAlpha=0.12;ctx.fillStyle="#00ffaa";ctx.fill();

    ctx.imageSmoothingEnabled=false;

  }

// Rysuje przeszkody:
// fromTop=true  → GÓRA: haczyk z robakiem (PNG kelp_tile.png) zwisający z żyłki
// fromTop=false → DÓŁ: glon (PNG kelp_bottom.png) kafelkowany w pionie z łączeniami
function drawKelp(ctx, cx, topEdge, botEdge, fromTop) {
  ctx.save();

  if (fromTop) {
    // ── GÓRNY HACZYK (bez zmian względem oryginału) ──
    const HEAD_W = PIPE_W - 4;
    const headRatio = (KELP_IMG.complete && KELP_IMG.naturalWidth) ? KELP_IMG.naturalHeight / KELP_IMG.naturalWidth : 1.28;
    const HEAD_H = HEAD_W * headRatio;
    const headTop = topEdge - HEAD_H;

    ctx.strokeStyle = "rgba(200,224,255,0.85)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    // Żyłka z góry ekranu do górnej krawędzi grafiki haczyka
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, headTop + 2); ctx.stroke();

    if (KELP_IMG.complete && KELP_IMG.naturalWidth !== 0) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(KELP_IMG, cx - HEAD_W / 2, headTop, HEAD_W, HEAD_H);
    }
  } else {
    // ── DOLNY GLON — kafelkowany w pionie od dna (y=H) do krawędzi przerwy (botEdge) ──
    if (!(GLON_IMG.complete && GLON_IMG.naturalWidth !== 0)) {
      // Grafika jeszcze nie gotowa — awaryjny zielony słup
      ctx.fillStyle = "#2d7a3a";
      ctx.fillRect(cx - 8, botEdge, 16, H - botEdge);
      ctx.restore();
      return;
    }

    const TILE_W = PIPE_W - 6;                          // szerokość kafla glona
    const ratio  = GLON_IMG.naturalHeight / GLON_IMG.naturalWidth;
    const TILE_H = TILE_W * ratio;                      // wysokość kafla
    const OVERLAP = Math.round(TILE_H * 0.06);          // zachodzenie → bezszwowe łączenia
    const STEP = TILE_H - OVERLAP;

    ctx.imageSmoothingEnabled = false;

    // Przycięcie do pasa od botEdge do dna, by glon nie wystawał ponad przerwę
    ctx.beginPath();
    ctx.rect(cx - TILE_W / 2 - 2, botEdge, TILE_W + 4, (H - botEdge) + 2);
    ctx.clip();

    // Kafle od dołu w górę, co drugi lustrzany → łodyga wije się naturalnie
    let i = 0;
    for (let yTop = H - TILE_H; yTop > botEdge - TILE_H; yTop -= STEP, i++) {
      ctx.save();
      ctx.translate(cx, yTop + TILE_H / 2);
      if (i % 2 === 1) ctx.scale(-1, 1);
      ctx.drawImage(GLON_IMG, -TILE_W / 2, -TILE_H / 2, TILE_W, TILE_H);
      ctx.restore();
    }
  }
  ctx.restore();
}
function drawHook(ctx, cx, hookY, fromTop) {
  ctx.save();
  if (fromTop) {
    // Górny haczyk (zwisający na żyłce) - BEZ ZMIAN
    ctx.beginPath(); ctx.setLineDash([6,5]); ctx.strokeStyle="rgba(210,240,255,0.55)"; ctx.lineWidth=1.5;
    ctx.moveTo(cx, 0); ctx.lineTo(cx, hookY-38);
    ctx.stroke(); ctx.setLineDash([]);
    
    const ex=cx, ey=hookY-36, sb=hookY+2;
    ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2); ctx.strokeStyle="#c8e0ff"; ctx.lineWidth=2; ctx.shadowColor="#aef0ff"; ctx.shadowBlur=6; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex,ey+5); ctx.lineTo(ex,sb); ctx.strokeStyle="#c8e0ff"; ctx.lineWidth=4; ctx.lineCap="round"; ctx.shadowBlur=8; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex,sb); ctx.bezierCurveTo(ex,sb+16,ex-22,sb+16,ex-22,sb+2); ctx.strokeStyle="#c8e0ff"; ctx.lineWidth=4; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-22,sb+2); ctx.lineTo(ex-14,sb-8); ctx.strokeStyle="#e8f4ff"; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-18,sb-3); ctx.lineTo(ex-10,sb-1); ctx.strokeStyle="#e8f4ff"; ctx.lineWidth=2; ctx.stroke();
    
    drawWorm(ctx, cx-22, hookY+4, false);
  } else {
    // Dolna przeszkoda - Zatopiony pień rosnący z dna jeziora
    const trunkW = 18; // Szerokość pnia
    const g = ctx.createLinearGradient(cx - trunkW/2, 0, cx + trunkW/2, 0);
    g.addColorStop(0, "#2d1e11"); // Ciemny brąz
    g.addColorStop(0.5, "#4a331e"); // Jasny brąz
    g.addColorStop(1, "#1c1209"); // Ciemny brąz
    
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(cx - trunkW/2, H);
    ctx.lineTo(cx - trunkW/2 + 2, hookY + 8);
    // Zaokrąglony czubek pnia
    ctx.quadraticCurveTo(cx, hookY, cx + trunkW/2 - 2, hookY + 8);
    ctx.lineTo(cx + trunkW/2, H);
    ctx.fill();
    
    // Słoje wzdłuż pnia
    ctx.strokeStyle = "rgba(20, 10, 0, 0.4)";
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - 3, H); ctx.lineTo(cx - 2, hookY + 15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 4, H); ctx.lineTo(cx + 2, hookY + 12); ctx.stroke();
    
    // Zielony mech na czubku
    ctx.fillStyle = "#2d5e30";
    ctx.beginPath();
    ctx.arc(cx, hookY + 8, 9, 0, Math.PI, true);
    ctx.fill();
    
    // Wodorost zawinięty wokół pnia (listek z lewej)
    ctx.beginPath();
    ctx.moveTo(cx - 6, hookY + 20);
    ctx.quadraticCurveTo(cx - 20, hookY + 10, cx - 25, hookY + 22);
    ctx.quadraticCurveTo(cx - 15, hookY + 28, cx - 6, hookY + 20);
    ctx.fillStyle = "#3a8240";
    ctx.fill();
    
    // Wodorost zawinięty wokół pnia (listek z prawej)
    ctx.beginPath();
    ctx.moveTo(cx + 6, hookY + 35);
    ctx.quadraticCurveTo(cx + 20, hookY + 25, cx + 22, hookY + 35);
    ctx.quadraticCurveTo(cx + 15, hookY + 42, cx + 6, hookY + 35);
    ctx.fillStyle = "#2d5e30";
    ctx.fill();
  }
  ctx.restore();
}

function hitsHook(fx, fy, p, tiny) {
  const cx = p.x + PIPE_W / 2;
  // Promień ryby nieco mniejszy niż grafika (48x32) — hitbox łaskawy,
  // gracz nie ginie "o włos". Osobno poziom/pion. Tiny = ~połowa.
  const FRX = tiny ? 6 : 11;
  const FRY = tiny ? 5 : 9;

  // ── GÓRNY HACZYK (PNG zwisa z góry, dolna krawędź grafiki na p.top) ──
  // Trzon/żyłka na osi cx, od góry ekranu do p.top.
  if (fy - FRY < p.top && Math.abs(fx - cx) < FRX + 4) return true;
  // Robak + zagięte ostrze rozciągają się głównie w bok przy dolnym końcu
  // haczyka (okolice p.top). Strefa nieco szersza, tuż przy krawędzi.
  if (fy + FRY > p.top - 8 && fy - FRY < p.top + 12 &&
      Math.abs(fx - cx) < FRX + 16) return true;

  // ── DOLNY GLON (kafelkowany, górny kraniec na p.top + GAP) ──
  // Łodyga glona realnie wąska; listki na bokach są "miękkie" i nie zabijają.
  const glonTop = p.top + GAP;
  if (fy + FRY > glonTop && Math.abs(fx - cx) < FRX + 4) return true;

  return false;
}

// ── Game ───────────────────────────────────────────────────────────────────
function initGame(){
  _lastTop=H/2-GAP/2;
  gs={fish:{x:100,y:H/2,vy:0,angle:0},pipes:[makePipe(W+200),makePipe(W+500)],pus:[],freeWorms:[],nextWorm:ri(300,500),
    bgFish:Array.from({length:10},()=>makeBgFish(true)),
    bubbles:Array.from({length:20},()=>({x:ri(0,W),y:ri(0,H),r:ri(3,8),vy:ri(1,3)*-0.4,a:Math.random()*0.4+0.1})),
    particles:[], flyingStars: [], score:0,combo:0,comboTimer:0,
    shield:false, boostTimer:0, starTimer:0, tinyTimer:0, slowTimer:0, invulnTimer:0,
    bgPalette:0,bgT:0,t:0,alive:true,usedBoost:false,pipeInterval:150,nextPipe:150};
  lastTs=0;paused=false;
}

function drawStaticFrame(ctx,s){
  if(!ctx||!s)return;
  ctx.imageSmoothingEnabled = true;
  // Tło jeziora (obrazek) — wypełnia ekran zachowując pokrycie (cover)
  if(LAKE_BG.complete && LAKE_BG.naturalWidth!==0){
    const iw=LAKE_BG.naturalWidth, ih=LAKE_BG.naturalHeight;
    const scale=Math.max(W/iw, H/ih);
    const dw=iw*scale, dh=ih*scale;
    ctx.drawImage(LAKE_BG,(W-dw)/2,(H-dh)/2,dw,dh);
  } else {
    ctx.fillStyle="#1a4a3a";ctx.fillRect(0,0,W,H);
  }
  // Cykl dzień/noc — subtelna granatowa warstwa, oscyluje powoli
  const night=(Math.sin(s.t*0.0008)+1)/2; // 0..1, pełny cykl ~kilkadziesiąt s
  if(night>0.02){
    ctx.save();
    ctx.globalAlpha=night*0.55; // max 55% przyciemnienia w nocy
    ctx.fillStyle="#040a1e";
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  ctx.save();ctx.globalAlpha=0.04;
  for(let i=0;i<5;i++){const rx=(i*120+s.t*0.3)%W;ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx+40,H);ctx.lineTo(rx+60,H);ctx.lineTo(rx+20,0);ctx.closePath();ctx.fillStyle="#aef0ff";ctx.fill();}
  ctx.restore();
  
  s.bubbles.forEach(b=>{ctx.save();ctx.globalAlpha=b.a;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle="#aef0ff";ctx.lineWidth=1;ctx.stroke();ctx.restore();});
  
  s.freeWorms.filter(w=>!w.collected).forEach(w=>drawFreeWorm(ctx,w,s.t));
  for(const f of s.bgFish)drawBgFish(ctx,f,s.t);
  
  ctx.imageSmoothingEnabled = true; 
  
  ctx.save();ctx.fillStyle="#0a4a3a";ctx.fillRect(0,0,W,8);ctx.fillRect(0,H-8,W,8);ctx.restore();
  s.pipes.forEach(p=>{drawKelp(ctx,p.x+PIPE_W/2,p.top,p.top+GAP,true);drawKelp(ctx,p.x+PIPE_W/2,p.top,p.top+GAP,false);});
  s.pus.filter(p=>!p.collected).forEach(p=>drawPU(ctx,p,s.t));
  s.particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life/40);ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.restore();});
  
  if (s.flyingStars) {
    s.flyingStars.forEach(fs => {
      ctx.save(); ctx.translate(fs.x, fs.y); ctx.rotate((1 - fs.life/fs.maxLife) * Math.PI * 4);
      ctx.font = "24px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 15; ctx.fillText("⭐", 0, 0); ctx.restore();
    });
  }
  // Nietykalność po wznowieniu: ryba miga, a wokół niej pierścień pokazuje
  // ile ochrony zostało (kurczy się z czasem).
  if(s.invulnTimer > 0){
    const totalFrames = REVIVE_INVULN_MS / 16.67;
    const frac = Math.max(0, Math.min(1, s.invulnTimer / totalFrames)); // 1 → 0
    // Migotanie: zaczynamy od RYBY WIDOCZNEJ (1), potem naprzemiennie.
    const blink = Math.floor(s.t * 0.3) % 2 === 1;
    if(!blink){
      drawFish(ctx,s.fish.x,s.fish.y,s.fish.angle,s.shield,s.starTimer>0,s.tinyTimer>0);
    }
    // Pierścień ochrony wokół ryby (zielony jak slow-motion, kurczy się z czasem)
    ctx.save();
    ctx.translate(s.fish.x, s.fish.y);
    ctx.beginPath();
    ctx.arc(0, 0, 30, -Math.PI/2, -Math.PI/2 + frac * Math.PI * 2);
    ctx.strokeStyle = "#00ff66";
    ctx.lineWidth = 3;
    ctx.shadowColor = "#00ff66";
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.restore();
  } else {
    drawFish(ctx,s.fish.x,s.fish.y,s.fish.angle,s.shield,s.starTimer>0,s.tinyTimer>0);
  }
}

function gameLoop(ts){
  if(paused)return;
  if(!lastTs)lastTs=ts;
  const dt=Math.min(ts-lastTs,50)/16.67;lastTs=ts;
  const s=gs;if(!s||!s.alive)return;
  const canvas=document.getElementById("canvas");if(!canvas)return;
  const ctx=canvas.getContext("2d");
  s.t+=dt;s.bgT+=0.003*dt;if(s.bgT>=1){s.bgT=0;s.bgPalette=(s.bgPalette+1)%BG.length;}
  
  const spd=PIPE_SPEED*(s.boostTimer>0?1.5:1)*(s.slowTimer>0?0.5:1)*(1+s.score*0.002)*dt;
  s.fish.vy+=GRAVITY*dt;if(s.fish.vy>6)s.fish.vy=6;
  s.fish.y+=s.fish.vy*dt;s.fish.angle=Math.max(-0.5,Math.min(1.2,s.fish.vy*0.07));
  if((s.fish.y<0||s.fish.y>H)&&s.invulnTimer<=0){die();return;}
  s.nextPipe-=dt;
  if(s.nextPipe<=0){
    const np=makePipe(W+20);
    s.pipes.push(np);
    s.nextPipe = s.pipeInterval / (1 + s.score * 0.002); 
    if(Math.random()<0.4)s.pus.push(makePU(W+20,np.top));
  }
  s.pipes=s.pipes.filter(p=>p.x+PIPE_W>-10);s.pus=s.pus.filter(p=>p.x>-20&&!p.collected);
  for(const p of s.pipes)p.x-=spd;for(const pu of s.pus)pu.x-=spd;
  for(const w of s.freeWorms)w.x-=spd*0.7;s.freeWorms=s.freeWorms.filter(w=>w.x>-40&&!w.collected);
  s.nextWorm-=dt;if(s.nextWorm<=0){s.freeWorms.push(makeFreeWorm(W+30));s.nextWorm=ri(250,450);}
  for(const w of s.freeWorms){if(!w.collected&&Math.hypot(s.fish.x-w.x,s.fish.y-w.y)<28){w.collected=true;s.score+=10;updateHUD();sfx.worm();for(let i=0;i<8;i++)s.particles.push({x:w.x,y:w.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,col:"#00ffaa"});}}
  for(const f of s.bgFish){f.x-=f.speed*dt;if(f.x<-160)Object.assign(f,makeBgFish(false));}
  
  for(const pu of s.pus){
    if(!pu.collected&&Math.hypot(s.fish.x-pu.x,s.fish.y-pu.y)<30){
      pu.collected=true;
      if (pu.type === "shield") s.shield = true;
      if (pu.type === "boost") { s.boostTimer = 600; s.usedBoost = true; }
      if (pu.type === "star") s.starTimer = 600;
      if (pu.type === "tiny") s.tinyTimer = 600;
      if (pu.type === "slowmo") s.slowTimer = 600;
      
      sfx[pu.type]&&sfx[pu.type]();
      const puLabels={boost:'🚀 Speed Boost!',shield:'🛡️ Bubble Shield!',star:'⭐ Star Rush!',tiny:'🐡 Tiny Fish!',slowmo:'🐢 Slow Motion!'};
      showPULabel(puLabels[pu.type]||pu.type);
      updatePUHud();
    }
  }
  
  let prevMax = Math.max(s.boostTimer, s.starTimer, s.tinyTimer, s.slowTimer);
  if(s.boostTimer>0) s.boostTimer-=dt;
  if(s.starTimer>0) s.starTimer-=dt;
  if(s.tinyTimer>0) s.tinyTimer-=dt;
  if(s.slowTimer>0) s.slowTimer-=dt;
  if(s.invulnTimer>0) s.invulnTimer-=dt;
  if(prevMax > 0) updatePUHud();
  
  for(const p of s.pipes){
    const fx=s.fish.x,fy=s.fish.y;
    if(!p.scored&&p.x+PIPE_W<fx){
      p.scored=true;
      if(s.starTimer>0) {
        s.score+=5;
        s.flyingStars.push({sx: fx, sy: fy, x: fx, y: fy, tx: W/2, ty: 40, life: 30, maxLife: 30});
      } else {
        s.score++;
      }
      s.combo++;s.comboTimer=120;
      for(let i=0;i<8;i++)s.particles.push({x:fx,y:fy,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:40,col:["#ffd700","#ff6bb5","#00f5ff"][ri(0,2)]});
      sfx.score();if(s.combo>=5)sfx.combo(s.combo);updateHUD();
    }
    
    if(s.starTimer>0)continue;
    if(s.invulnTimer>0)continue;  // nietykalność po wznowieniu — nie sprawdzaj kolizji

    if(hitsHook(s.fish.x,s.fish.y,p,s.tinyTimer>0)){
      if(!p.shieldUsed&&s.shield){
         p.shieldUsed=true;
         s.shield=false;
         sfx.shield();
         for(let i=0;i<16;i++)s.particles.push({x:s.fish.x,y:s.fish.y,vx:(Math.random()-0.5)*9,vy:(Math.random()-0.5)*9,life:35,col:"#00f5ff"});
      }
      else if(!p.shieldUsed){die();return;}
    }
  }
  s.comboTimer-=dt;if(s.comboTimer<=0&&s.combo>0){s.combo=0;updateHUD();}
  
  s.bubbles = s.bubbles.filter(b => {
    b.y += b.vy * dt;
    if (b.y < -10) {
      if (b.isTap) return false; 
      b.y = H + 10;
      b.x = ri(0, W);
    }
    return true; 
  });

  s.particles=s.particles.filter(p=>p.life>0);s.particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=dt;});
  
  if (!s.flyingStars) s.flyingStars = [];
  s.flyingStars = s.flyingStars.filter(fs => fs.life > 0);
  s.flyingStars.forEach(fs => {
    fs.life -= dt;
    let progress = 1 - (fs.life / fs.maxLife);
    let ease = 1 - Math.pow(1 - progress, 3);
    fs.x = fs.sx + (fs.tx - fs.sx) * ease;
    fs.y = fs.sy + (fs.ty - fs.sy) * ease;
  });

  drawStaticFrame(ctx, s);
  raf=requestAnimationFrame(gameLoop);
}

async function die(){
  if(gs)gs.alive=false;
  cancelAnimationFrame(raf);
  stopMusic();sfx.die();vibrate(300);

  deathCount++;  // policz tę śmierć (do interstitiala co 3)

  // Interstitial co INTERSTITIAL_EVERY śmierć — pokazujemy PRZED ekranem śmierci.
  // showAd na razie udaje reklamę i od razu woła callback → potem ekran śmierci.
  if(deathCount % INTERSTITIAL_EVERY === 0){
    showAd("interstitial", ()=>{ showDeathScreen(); });
  } else {
    showDeathScreen();
  }
}

// Wyświetla ekran śmierci i zapisuje wynik. Wydzielone z die(),
// żeby dało się je wywołać także po zamknięciu interstitiala.
function showDeathScreen(){
  const finalScore=gs?gs.score:0;
  screen="dead";
  render();

  if (finalScore >= 5) {
    submitScore(nick, finalScore, gs.usedBoost).then(board=>{
      const rank=board.findIndex(e=>e.nick===nick)+1;
      const rb=document.getElementById("rank-badge");
      if(rb&&rank>0)rb.innerHTML=`${t("yourPos")}: <b>#${rank}</b> ${t("of")}`;
    });
  } else {
    const rb=document.getElementById("rank-badge");
    if(rb) rb.innerHTML="Wyniki poniżej 5 pkt nie są zapisywane 🌊";
  }
}

// ── Wznowienie po reklamie (revive) ─────────────────────────────────────────
// Przywraca grę ze stanu sprzed śmierci, ale w BEZPIECZNY sposób:
// ożywia rybę na środku z zerową prędkością, odsuwa pobliskie przeszkody,
// daje chwilową nietykalność i odlicza 3-2-1 zanim sterowanie wróci.
function reviveGame(){
  if(!gs) { startGame(); return; }

  // 1) Ożyw rybę i ustaw ją w bezpiecznej pozycji (środek pionowo, brak prędkości)
  gs.alive = true;
  gs.fish.y = H/2;
  gs.fish.vy = 0;
  gs.fish.angle = 0;

  // 2) Odsuń przeszkody: usuń te, które są już blisko/za rybą,
  //    i przesuń pozostałe daleko w prawo, żeby gracz miał czysty start.
  //    Ryba jest na x≈100, więc czyścimy wszystko do x = fish.x + 250.
  const safeX = gs.fish.x + 250;
  gs.pipes = gs.pipes.filter(p => p.x > safeX);
  gs.pus = gs.pus.filter(p => p.x > safeX && !p.collected);
  // Jeśli po czyszczeniu nie ma żadnej rury w zasięgu, dorzuć nową daleko z przodu
  if(gs.pipes.length === 0){ gs.pipes.push(makePipe(W + 200)); }
  gs.nextPipe = Math.max(gs.nextPipe, gs.pipeInterval); // odsuń moment kolejnej rury

  // 3) Wyczyść aktywne efekty kolizyjne, włącz nietykalność
  gs.invulnTimer = REVIVE_INVULN_MS / 16.67; // ms → klatki (dt liczone w klatkach)
  gs.t = 0; // reset licznika czasu → migotanie zacznie od RYBY WIDOCZNEJ

  // 4) Wróć na ekran gry i odlicz 3-2-1 (jak w pauzie), potem wznów pętlę
  screen = "playing";
  paused = true;            // zatrzymaj pętlę na czas odliczania
  cancelAnimationFrame(raf);
  render();                 // odbuduj canvas/HUD ekranu gry

  // WAŻNE: render() tylko tworzy canvas — to gameLoop rysuje klatki, a on jeszcze
  // nie wystartował (czeka na koniec odliczania). Żeby NIE było czarnego ekranu,
  // rysujemy jedną statyczną klatkę gry od razu, tak by gracz widział rybę i tło
  // podczas odliczania 3-2-1.
  const canvas = document.getElementById("canvas");
  if(canvas){
    const ctx = canvas.getContext("2d");
    drawStaticFrame(ctx, gs);
  }

  startCountdown(()=>{
    paused=false; resumeMusic(); lastTs=0; raf=requestAnimationFrame(gameLoop);
  });
}

// ── Pause ──────────────────────────────────────────────────────────────────
function togglePause(){
  if(screen!=="playing"||!gs||!gs.alive)return;
  if(!paused){paused=true;cancelAnimationFrame(raf);pauseMusic();sfx.pause();showPauseOverlay();}
  else resumeFromPause();
}
function showPauseSettings(){
  const wrap=document.getElementById("game-wrap");if(!wrap)return;
  const existing=document.getElementById("pause-settings-overlay");if(existing)return;
  const div=document.createElement("div");div.id="pause-settings-overlay";div.addEventListener("pointerdown",e=>e.stopPropagation());
  div.style.cssText="position:absolute;inset:0;background:rgba(4,12,30,0.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:220";
  div.innerHTML=`<div style="background:linear-gradient(145deg,#0d2040,#091830);border:1.5px solid #00f5ff55;border-radius:20px;padding:24px;width:260px;display:flex;flex-direction:column;gap:0;box-shadow:0 0 40px #00f5ff22">
    <div style="font-size:18px;font-weight:800;color:#fff;text-align:center;margin-bottom:14px">⚙️ ${t("settings")}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #ffffff0a">
      <span style="color:#cde;font-size:14px;font-weight:700">🎵 ${t("music")}</span>
      <button class="toggle ${settings.music?"on":"off"}" id="ps-tog-music"></button>
    </div>

      <span style="color:#cde;font-size:14px;font-weight:700">🔊 ${t("sound")}</span>
      <button class="toggle ${settings.sound?"on":"off"}" id="ps-tog-sound"></button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
      <span style="color:#cde;font-size:14px;font-weight:700">📳 ${t("vibration")}</span>
      <button class="toggle ${settings.vibration?"on":"off"}" id="ps-tog-vibr"></button>
    </div>
    <button class="btn" id="ps-close" style="margin-top:16px">${t("back")}</button>
  </div>`;
  wrap.appendChild(div);

  const makeToggle=(id,key,cb)=>{
    document.getElementById(id).onclick=function(e){
      e.stopPropagation();
      settings[key]=!settings[key];saveSettings();
      this.className="toggle "+(settings[key]?"on":"off");

function showPauseOverlay(){
  const wrap=document.getElementById("game-wrap");if(!wrap)return;
  if(document.getElementById("pause-overlay"))return;
  const div=document.createElement("div");div.id="pause-overlay";div.className="pause-overlay";div.addEventListener("pointerdown",e=>e.stopPropagation());
  div.innerHTML=`<div class="pause-card" style="animation:fadeInUp 0.3s ease">
    <div class="pause-title">⏸ ${t("paused")}</div>
    <div class="pause-score">${t("score")}: <b style="color:#ffd700">${gs?gs.score:0}</b></div>
    <button id="resume-btn" class="btn" style="width:220px;animation:pulse 1.5s infinite">${t("resume")}</button>
    <button id="pause-settings-btn" class="btn btn-ghost" style="width:220px;font-size:14px">⚙️ ${t("settings")}</button>
    <button id="quit-btn" class="btn btn-red" style="width:220px;font-size:14px">${t("quit")}</button>
  </div>`;
  wrap.appendChild(div);
  const addBtn=(id,fn)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener("pointerdown",e=>e.stopPropagation());
    el.addEventListener("click",e=>{e.stopPropagation();fn();});
  };
  addBtn("resume-btn",()=>resumeFromPause());
  addBtn("pause-settings-btn",()=>showPauseSettings());
  addBtn("quit-btn",()=>{
    paused=false;
    cancelAnimationFrame(raf);
    stopMusic();
    screen="nick";
    render();
  });
}
function resumeFromPause(){
  document.getElementById("pause-overlay")?.remove();
  sfx.resume();
  startCountdown(()=>{paused=false;resumeMusic();lastTs=0;raf=requestAnimationFrame(gameLoop);});
}
function startCountdown(onDone){
  countdownActive=true;
  const wrap=document.getElementById("game-wrap");if(!wrap)return;
  let n=3;const C=2*Math.PI*42;
  function showNum(){
    document.getElementById("countdown-el")?.remove();
    if(n<0){countdownActive=false;onDone();return;}
    sfx.countdown(n);
    const div=document.createElement("div");div.id="countdown-el";
    div.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:210";
    if(n===0){div.innerHTML=`<div style="font-size:56px;font-weight:800;color:#00ffaa;text-shadow:0 0 30px #00ffaa;animation:countPop 0.6s ease forwards">GO!</div>`;}
    else{const off=C*(1-n/3);div.innerHTML=`<div class="countdown-circle"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff22" stroke-width="6"/><circle cx="50" cy="50" r="42" fill="none" stroke="#00f5ff" stroke-width="6" stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 0.9s linear"/></svg><div class="countdown-num" style="animation:countPop 0.4s ease">${n}</div></div>`;}
    wrap.appendChild(div);n--;setTimeout(showNum,n<0?600:1000);
  }
  showNum();
}

// ── HUD ────────────────────────────────────────────────────────────────────
function updateHUD(){
  const el=document.getElementById("score-hud");if(el)el.textContent=gs.score;
  // Licznik combo pod wynikiem usunięty — mnożnik nadal działa w punktacji.
}
let puLT=null;
function showPULabel(txt){
  const el=document.getElementById("pu-flash");if(!el)return;
  el.textContent=txt;el.style.display="block";clearTimeout(puLT);puLT=setTimeout(()=>{if(el)el.style.display="none";},1800);
}

// ── System Osobnych Slotów na Power-upy ──
function updatePUHud(){
  const s=gs, ind=document.getElementById("pu-container");if(!ind)return;
  let html = "";
  
  const addSlot = (timer, icon, col, name) => {
    if(timer > 0) {
      const pct = (timer/600)*100;
      html += `<div style="background:rgba(6,13,26,0.85); border:2px solid ${col}; border-radius:12px; padding:6px 14px; text-align:center; min-width:85px; box-shadow: 0 0 15px ${col}55;">
          <div style="font-size:22px; margin-bottom:2px;">${icon}</div>
          <div style="font-size:10px; color:${col}; font-weight:900; margin-bottom:4px; text-transform:uppercase;">${name}</div>
          <div style="width:100%; height:6px; background:#fff3; border-radius:3px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${col};"></div></div>
      </div>`;
    }
  };

  addSlot(s.boostTimer, "🚀", PU_COLORS.boost, "Boost");
  addSlot(s.starTimer, "⭐", PU_COLORS.star, "Star");
  addSlot(s.tinyTimer, "🐡", PU_COLORS.tiny, "Tiny");
  addSlot(s.slowTimer, "🐢", PU_COLORS.slowmo, "Slow");

  if(html === "") {
    ind.style.display = "none";
  } else {
    ind.style.display = "flex";
    ind.innerHTML = html;
  }
}

// ── Language picker ────────────────────────────────────────────────────────
function showLangPicker(onSelect){
  const div=document.createElement("div");div.className="lang-overlay";div.id="lang-overlay";
  div.innerHTML=`<div class="lang-card" style="animation:langIn 0.3s ease">
    <div class="lang-title">🌊 ${t("chooseLanguage")}</div>
    <div class="lang-grid">${LANGS.map(l=>`
      <button class="lang-btn${lang===l.code?" selected":""}" data-code="${l.code}">
        <span class="flag">${l.flag}</span><span>${l.name}</span>
      </button>`).join("")}</div>
  </div>`;
  document.body.appendChild(div);
  div.querySelectorAll(".lang-btn").forEach(btn=>{
    btn.onclick=()=>{
      lang=btn.dataset.code;
      localStorage.setItem("or_lang",lang);
      div.remove();
      if(onSelect)onSelect();
    };
  });
}

// ── Settings screen ────────────────────────────────────────────────────────
function renderSettings(){
  const app=document.getElementById("app");
  app.innerHTML=`<div class="panel">
    <div class="panel-header"><div class="logo2" style="font-size:20px">⚙️ ${t("settings")}</div></div>
    <div style="flex:1;overflow-y:auto">
      <div class="settings-row">
        <div><div class="settings-label">🎵 ${t("music")}</div><div class="settings-sub">${t("musicDesc")}</div></div>
        <button class="toggle ${settings.music?"on":"off"}" id="tog-music"></button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">🔊 ${t("sound")}</div><div class="settings-sub">${t("soundDesc")}</div></div>
        <button class="toggle ${settings.sound?"on":"off"}" id="tog-sound"></button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">📳 ${t("vibration")}</div><div class="settings-sub">${t("vibrDesc")}</div></div>
        <button class="toggle ${settings.vibration?"on":"off"}" id="tog-vibr"></button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">🌍 ${t("language")}</div><div class="settings-sub">${getLangFlag(lang||"en")} ${LANGS.find(l=>l.code===(lang||"en"))?.name||"English"}</div></div>
        <button class="btn" style="width:80px;padding:8px;font-size:13px" id="lang-change-btn">${t("change")}</button>
      </div>
    </div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" id="back-btn">${t("back")}</button>
    </div>
  </div>`;

  const makeToggle=(id,key,cb)=>{
    document.getElementById(id).onclick=function(){
      settings[key]=!settings[key];saveSettings();
      this.className="toggle "+(settings[key]?"on":"off");
      if(cb)cb();
    };
  };
  makeToggle("tog-music","music",()=>{if(!settings.music)stopMusic();else if(screen==="playing")startMusic();});
  makeToggle("tog-sound","sound");
  makeToggle("tog-vibr","vibration");
  document.getElementById("lang-change-btn").onclick=()=>showLangPicker(renderSettings);
  document.getElementById("back-btn").onclick=()=>{screen="nick";render();};
}

// ── Main screens ───────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(screen==="settings"){renderSettings();return;}
  if(screen==="nick"){
    app.innerHTML=`<div class="card">
      <div class="logo">🐠 Fish Rush</div>
      <p class="sub">${t("depthsAwait")}</p>
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <input id="nick-input" placeholder="${t("yourNick")}" maxlength="16" autocomplete="off" style="flex:1"/>
        <span style="font-size:22px;cursor:pointer" id="flag-btn" title="${t("language")}">${getLangFlag(lang||"en")}</span>
      </div>
      <button class="btn" id="play-btn">${t("dive")}</button>
      <button class="btn btn-purple" id="board-btn">${t("ranking")}</button>
      <button class="btn btn-orange" id="powers-btn">${t("powers")}</button>
      <button class="btn" style="background:linear-gradient(135deg,#00aa66,#006644);box-shadow:0 4px 20px #00aa6644" id="fish-btn">🐠 ${t("chooseFish")}</button>
      <button class="btn btn-ghost" id="settings-btn">⚙️ ${t("settings")}</button>
    </div>`;
    const inp=document.getElementById("nick-input");inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")startGame();});
    document.getElementById("play-btn").onclick=startGame;
    document.getElementById("board-btn").onclick=showBoard;
    document.getElementById("powers-btn").onclick=()=>{screen="powers";render();};
    document.getElementById("fish-btn").onclick=()=>{screen="fish";render();};
    document.getElementById("settings-btn").onclick=()=>{screen="settings";render();};
    document.getElementById("flag-btn").onclick=()=>showLangPicker(render);
    startMusic();
    return;
  }
  if(screen==="fish"){
    const skins=[
      {id:"pink", label:"🩷 "+t("skinPink"), glow:"#ff6bb5"},
      {id:"blue", label:"💙 "+t("skinBlue"), glow:"#4488ff"},
      {id:"orange",label:"🧡 "+t("skinOrange"), glow:"#ff6622"},
      {id:"green", label:"💚 "+t("skinGreen"), glow:"#00ff66"},
      {id:"red",   label:"❤️ "+t("skinRed"), glow:"#ff2222"},
    ];
    app.innerHTML=`<div class="panel" style="width:min(340px,92vw)">
      <div class="panel-header">
        <div class="logo2">🐠 ${t("chooseFish")}</div>
        <div class="sub">${t("chooseFishSub")}</div>
      </div>
      <div style="flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:12px 16px;display:flex;flex-direction:column;gap:10px" class="plist">
        ${skins.map(s=>`
        <button data-fishid="${s.id}" class="fish-skin-btn" style="
          background:${fishColor===s.id?s.glow+'33':'#ffffff08'};
          border:2px solid ${fishColor===s.id?s.glow:'#ffffff22'};
          border-radius:14px;padding:14px 16px;cursor:pointer;
          display:flex;align-items:center;gap:14px;
          box-shadow:${fishColor===s.id?'0 0 16px '+s.glow+'66':'none'};
          transition:all 0.15s">
          
          <img src="${PLAYER_SKINS[s.id]}" style="width:60px; height:40px; border-radius:8px; background:rgba(0,0,0,0.3); object-fit:contain; image-rendering: pixelated;" alt="${s.label}">
          
          <div style="flex:1;text-align:left">
            <div style="font-size:16px;font-weight:800;color:#fff">${s.label}</div>
            ${fishColor===s.id?`<div style="font-size:11px;color:${s.glow};margin-top:2px">✓ ${t("selected")}</div>`:''}
          </div>
        </button>`).join("")}
      </div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">${t("back")}</button></div>
    </div>`;
    
    document.getElementById("back-btn").onclick=()=>{screen="nick";render();};
    document.querySelectorAll(".fish-skin-btn").forEach(btn=>{
      btn.onclick=()=>{
        fishColor=btn.dataset.fishid;
        localStorage.setItem("or_fish",fishColor);
        screen="fish";render();
      };
    });
    return;
  }

  if(screen==="powers"){
  app.innerHTML=`<div class="panel"><div class="panel-header"><div class="logo2">${t("powers")}</div></div><div class="plist">${[
    {icon:"🚀",col:"#ff6b35",name:"Speed Boost",desc:lang==="pl"?"Lecisz szybciej (x1.5)! Znika z puli po 800 pkt.":lang==="de"?"Fliegst schneller (x1.5)! Verlässt den Pool nach 800 Pkt.":"Speed x1.5! Leaves the pool after 800 pts.",dur:"⏱ 10 sec"},
    {icon:"🛡️",col:"#00f5ff",name:"Bubble Shield",desc:lang==="pl"?"Tęczowa bańka — chroni przed jednym błędem!":lang==="de"?"Schutzblase — schützt vor einem Fehler!":"Rainbow bubble — protects from one hook!",dur:lang==="pl"?"🛡️ Do zderzenia":lang==="de"?"🛡️ Bis zum Treffer":"🛡️ Until hit"},
    {icon:"⭐",col:"#ffd700",name:"Star Rush",desc:lang==="pl"?"Złota niezniszczalność + 5 pkt za haczyk!":lang==="de"?"Unbesiegbar + 5 Pkt pro Haken!":"Invincible + 5 pts per hook."},
    {icon:"🐡",col:"#ff44cc",name:"Tiny Fish",desc:lang==="pl"?"Zmniejszasz się o połowę! Łatwiej omijać przeszkody.":lang==="de"?"Wirst halb so groß!":"Half size! Easier to dodge hooks."},
    {icon:"🐢",col:"#00ff66",name:"Slow Mo",desc:lang==="pl"?"Spowalniasz świat wokół siebie! Odkryj po 800 pkt.":lang==="de"?"Verlangsame die Welt! Ab 800 Pkt.":"Slow down the world! Discovered at 800 pts.",dur:"⏱ 10 sec"}
  ].map(p=>`<div class="pcard"><div class="picon">${p.icon}</div><div class="pdot" style="background:${p.col};box-shadow:0 0 8px ${p.col}"></div><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div><div class="pdur">${p.dur||"⏱ 10 sec"}</div></div></div>`).join("")}</div><div style="padding:0 16px 16px"><button class="btn" id="back-btn">${t("back")}</button></div></div>`;
  
  document.getElementById("back-btn").onclick=()=>{
    if(boardFrom==="playing"&&gs&&gs.alive){
      boardFrom=null;screen="playing";paused=true;render();
      requestAnimationFrame(()=>{
        const canvas=document.getElementById("canvas");
        if(canvas&&gs){const ctx=canvas.getContext("2d");drawStaticFrame(ctx,gs);}
        startCountdown(()=>{paused=false;resumeMusic();lastTs=0;raf=requestAnimationFrame(gameLoop);});
      });
    }else{boardFrom=null;screen="nick";render();}
  };
  return;
}
  if(screen==="board"){
    app.innerHTML=`<div class="panel">
      <div class="panel-header"><div class="logo2">🏆 TOP 100</div><div class="sub">${t("globalRanking")}</div></div>
      <div class="blist"><div class="loading">${t("loading")}</div></div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">${t("back")}</button></div>
    </div>`;
    document.getElementById("back-btn").onclick=()=>{
    if(boardFrom==="playing"&&gs&&gs.alive){
      boardFrom=null;
      screen="playing";
      paused=true;
      render();
      requestAnimationFrame(()=>{
        const canvas=document.getElementById("canvas");
        if(canvas&&gs){
          const wasPaused=paused;
          paused=false;
          const s=gs;
          const ctx=canvas.getContext("2d");
          drawStaticFrame(ctx,s);
          paused=wasPaused;
        }
        sfx.resume&&sfx.resume();
        startCountdown(()=>{
          paused=false;
          resumeMusic();
          lastTs=0;
          raf=requestAnimationFrame(gameLoop);
        });
      });
    }else{
      boardFrom=null;
      screen="nick";render();
    }
  };
    loadBoard().then(board=>{
      const bl=document.querySelector(".blist");if(!bl)return;
      bl.innerHTML=board.length===0?`<div class="empty">${t("noScores")}</div>`:
        board.map((e,i)=>`<div class="brow ${e.nick===nick?"brow-me":""} ${i<3?"brow-top":""}">
          <span class="rnum">${i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}</span>
          <span class="rflag">${e.flag||"🌐"}</span>
          <span class="rnick">${e.nick}${e.boost?" 🚀":""}</span>
          <span class="rscore">${e.score}</span>
          <span class="rdate">${e.date}</span>
        </div>`).join("");
    });return;
  }
  if(screen==="dead"){
    // Przycisk "Wznów za reklamę" pokazujemy tylko gdy gracz NIE użył jeszcze
    // wznowienia w tej rozgrywce (jeden revive na grę).
    const canRevive = !reviveUsed && gs;
    const reviveBtnHtml = canRevive
      ? `<button class="btn" id="revive-btn" style="background:linear-gradient(145deg,#1a7a3a,#0d5a28);animation:pulse 1.5s infinite">▶️ Wznów (reklama)</button>`
      : "";
    app.innerHTML=`<div class="card">
      <div style="font-size:52px">💀</div>
      <div class="logo">${t("gameOver")}</div>
      <div style="font-size:22px;color:#cde">${t("score")}: <b style="color:#ffd700">${gs?gs.score:0}</b></div>
      <div id="rank-badge" class="rank-badge" style="opacity:0.5">${t("saving")}</div>
      ${reviveBtnHtml}
      <button class="btn" id="retry-btn">${t("playAgain")}</button>
      <button class="btn btn-purple" id="board-btn2">${t("seeRanking")}</button>
      <button class="btn btn-ghost" id="nick-btn">${t("changeNick")}</button>
    </div>`;
    if(canRevive){
      document.getElementById("revive-btn").onclick=()=>{
        reviveUsed = true;  // zużyj jednorazowy revive
        // Rewarded ad — po obejrzeniu (teraz: udawanym) wznawiamy grę
        showAd("rewarded", ()=>{ reviveGame(); });
      };
    }
    document.getElementById("retry-btn").onclick=startGame;
    document.getElementById("board-btn2").onclick=showBoard;
    document.getElementById("nick-btn").onclick=()=>{screen="nick";render();};return;
  }
if(screen==="ready"||screen==="playing"){
    app.innerHTML=`
      <div id="game-wrap" style="position:relative; width:100vw; height:100vh; overflow:hidden;">
        <canvas id="canvas"></canvas>
        
        <div id="player-name-hud">👤 ${nick}</div>
        
        <div id="game-hud">
          <div class="hud-btn btn-pause" id="hud-pause">⏸️</div>
          <div class="hud-btn btn-rank" id="hud-rank">🏆</div>
        </div>
        
        <div class="hud" style="top:40px; pointer-events:none; z-index:50;">
          <div class="score-hud" id="score-hud">${gs?gs.score:0}</div>
        </div>
        
        <div id="pu-container" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:none; gap:10px; z-index:60; pointer-events:none; align-items:flex-end;"></div>
        
        <div class="pu-flash" id="pu-flash" style="display:none; z-index:60;"></div>
        
        ${screen==="ready"?`<div class="overlay" id="ready-overlay" style="pointer-events:none; z-index:100;"><div class="overlay-card"><div style="font-size:40px">🐠</div><div style="font-size:22px;font-weight:800;color:#fff">${t("ready")}, ${nick}!</div><div style="font-size:13px;color:#aef0ff;margin-top:4px">${t("tap")}</div></div></div>`:""}
      </div>
    `;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    W = window.innerWidth;
    H = window.innerHeight;
    
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.scale(dpr, dpr);

    // tap na całym polu gry, ALE ignoruj jeśli dotyk trafił w przycisk HUD
    document.getElementById("game-wrap").addEventListener("pointerdown", function(e){
      if (e.target && e.target.closest && e.target.closest(".hud-btn")) return;
      tap(e);
    });
    
    // Przyciski HUD — własny handler, niezależny od propagacji
    const hudPause = document.getElementById("hud-pause");
    hudPause.addEventListener("pointerdown", e => {
      e.stopPropagation();
      e.preventDefault();
      togglePause();
    });
    
    const hudRank = document.getElementById("hud-rank");
    hudRank.addEventListener("pointerdown", e => {
      e.stopPropagation();
      e.preventDefault();
      boardFrom = "playing";
      cancelAnimationFrame(raf);
      pauseMusic();
      paused = true;
      showBoard();
    });
    return;
  }
} // ZAMKNIĘCIE FUNKCJI render()

function showBoard(){
  if(!boardFrom) boardFrom="nick";
  screen="board";render();
}
function startGame(){
  const inp=document.getElementById("nick-input");if(inp)nick=inp.value.trim()||nick;if(!nick)return;
  reviveUsed=false;  // każda nowa rozgrywka ma swój jeden revive
  cancelAnimationFrame(raf);stopMusic();boardFrom=null;initGame();screen="ready";render();
}
function tap(e){
  if(e && e.cancelable && e.type !== "keydown") e.preventDefault();
  if(e) e.stopPropagation(); 
  if(countdownActive) return;
  if(paused){togglePause();return;}
  if(screen==="ready"){
    document.getElementById("ready-overlay")?.remove();
    screen="playing";lastTs=0;startMusic();raf=requestAnimationFrame(gameLoop);return;
  }
  if(screen==="playing"&&gs&&gs.alive){
    sfx.jump();
    gs.fish.vy=JUMP;
    for(let i=0;i<6;i++) gs.bubbles.push({x:gs.fish.x-10+Math.random()*20, y:gs.fish.y+Math.random()*10, r:ri(2,5), vy:-Math.random()*2-0.5, a:0.6, isTap:true});
  }
}
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();tap();}if(e.code==="Escape"||e.code==="KeyP")togglePause();});

document.addEventListener("contextmenu",e=>e.preventDefault());

let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    if(event.target.tagName !== 'INPUT') {
      event.preventDefault();
    }
  }
  lastTouchEnd = now;
}, { passive: false });

if(!lang){showLangPicker(()=>{lang=lang||detectLang();render();});}
else render();
</script>
</body>
</html>
